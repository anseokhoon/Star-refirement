export default {
  async fetch(request, env, ctx) {
    return new Response(HTML, {
      headers: {
        "content-type": "text/html;charset=UTF-8",
        "cache-control": "public, max-age=300",
      },
    });
  },
};

const HTML = `<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KB스타웰스매니저 은퇴 설계 계산기</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 selection:bg-yellow-200">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect } = React;

        const RetirementCalculator = () => {
            const [currentAge, setCurrentAge] = useState(40);
            const [retirementAge, setRetirementAge] = useState(62);
            const [monthlyExpense, setMonthlyExpense] = useState(500);
            const [inflationRate, setInflationRate] = useState(3.0);
            const [withdrawalRate, setWithdrawalRate] = useState(5.0);
            const [investmentReturnRate, setInvestmentReturnRate] = useState(7.0);
            const [useBenzMark, setUseBenzMark] = useState(false);

            const [results, setResults] = useState({
                yearsToRetire: 0,
                futureMonthlyExpense: 0,
                futureAnnualExpense: 0,
                targetCorpus: 0,
                investmentTarget: 0,
                monthlySavings: 0,
            });

            const formatKRW = (number) => {
                if (number === 0 || isNaN(number)) return '0원';
                const actualAmount = number * 10000; 
                
                const uk = Math.floor(actualAmount / 100000000);
                const man = Math.floor((actualAmount % 100000000) / 10000);
                
                let result = '';
                if (uk > 0) result += uk.toLocaleString() + '억 ';
                if (man > 0) result += man.toLocaleString() + '만 ';
                
                if (uk === 0 && man === 0) return Math.floor(actualAmount).toLocaleString() + '원';
                return result.trim() + '원';
            };

            const formatNumber = (num) => {
                return Math.round(num).toLocaleString();
            };

            useEffect(() => {
                const years = Math.max(0, retirementAge - currentAge);
                const futureMonthly = monthlyExpense * Math.pow(1 + inflationRate / 100, years);
                const futureAnnual = futureMonthly * 12;
                const target = futureAnnual / (withdrawalRate / 100);
                const investmentTargetAmount = useBenzMark ? target / 3 : target;
                
                const r = investmentReturnRate / 100 / 12;
                const n = years * 12;
                
                let requiredMonthlySavings = 0;
                if (n > 0) {
                    if (r === 0) {
                        requiredMonthlySavings = investmentTargetAmount / n;
                    } else {
                        requiredMonthlySavings = (investmentTargetAmount * r) / (Math.pow(1 + r, n) - 1);
                    }
                }

                setResults({
                    yearsToRetire: years,
                    futureMonthlyExpense: futureMonthly,
                    futureAnnualExpense: futureAnnual,
                    targetCorpus: target,
                    investmentTarget: investmentTargetAmount,
                    monthlySavings: requiredMonthlySavings,
                });
            }, [currentAge, retirementAge, monthlyExpense, inflationRate, withdrawalRate, investmentReturnRate, useBenzMark]);

            const benzLabelClass = useBenzMark 
                ? 'flex items-center cursor-pointer p-4 sm:p-5 rounded-xl border-2 transition-all shadow-sm border-[#FFCC00] bg-yellow-50/50'
                : 'flex items-center cursor-pointer p-4 sm:p-5 rounded-xl border-2 transition-all shadow-sm border-gray-200 bg-white hover:border-gray-300';
            
            const benzToggleBg = useBenzMark
                ? 'block w-12 h-7 rounded-full transition-colors bg-[#FFCC00]'
                : 'block w-12 h-7 rounded-full transition-colors bg-gray-300';
            
            const benzToggleDot = useBenzMark
                ? 'absolute left-1 top-1 bg-white w-5 h-5 rounded-full transition-transform duration-200 translate-x-5 shadow-sm'
                : 'absolute left-1 top-1 bg-white w-5 h-5 rounded-full transition-transform duration-200';

            const benzTextClass = useBenzMark
                ? 'block text-sm sm:text-base font-bold text-[#3b3a39]'
                : 'block text-sm sm:text-base font-bold text-gray-700';

            return (
                <div className="min-h-screen p-3 sm:p-4 md:p-8 font-sans text-gray-800">
                    <div className="max-w-5xl mx-auto space-y-5 sm:space-y-6">
                        
                        <header className="bg-[#3b3a39] text-white p-6 sm:p-8 rounded-2xl shadow-xl flex flex-col md:flex-row justify-between items-start md:items-center relative overflow-hidden">
                            <div className="absolute -right-10 -top-10 opacity-10">
                                <svg width="200" height="200" viewBox="0 0 24 24" fill="#FFCC00">
                                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                                </svg>
                            </div>
                            
                            <div className="relative z-10 w-full">
                                <div className="flex items-center mb-2">

                                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                                    </svg>
                                    <span className="text-xl sm:text-2xl font-extrabold tracking-tight">KB<span className="font-light">스타</span><span className="font-bold">웰스매니저</span></span>
                                </div>
                                <h1 className="text-2xl sm:text-3xl md:text-4xl font-bold text-white mt-1">은퇴 설계 계산기</h1>
                                <p className="text-gray-300 mt-2 text-sm sm:text-base font-light">고객님의 완벽한 노후를 위한 맞춤형 재무 로드맵</p>
                            </div>
                            
                            <div className="mt-6 md:mt-0 relative z-10 bg-[#2a2928]/80 px-5 py-3 rounded-xl border border-[#4a4948] backdrop-blur-sm w-full md:w-auto text-center md:text-left flex md:block items-center justify-between">
                                <span className="text-sm text-gray-300">은퇴까지 남은 기간</span>
                                <div className="text-2xl sm:text-3xl font-extrabold text-[#FFCC00]">{results.yearsToRetire}<span className="text-lg text-gray-300 font-medium ml-1">년</span></div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            
                            <div className="lg:col-span-5 space-y-6 bg-white p-5 sm:p-7 rounded-2xl shadow-lg border border-gray-100">
                                <h2 className="text-lg sm:text-xl font-bold text-gray-800 flex items-center border-b pb-4">
                                    <span className="bg-[#3b3a39] text-[#FFCC00] w-7 h-7 sm:w-8 sm:h-8 rounded-full flex items-center justify-center mr-3 text-sm font-bold shadow-sm">1</span>
                                    고객 재무 정보 입력
                                </h2>
                                
                                <div className="space-y-5">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">현재 나이</label>
                                            <div className="flex shadow-sm rounded-lg overflow-hidden border border-gray-300 focus-within:ring-2 focus-within:ring-[#FFCC00] focus-within:border-[#FFCC00] bg-white transition-all">
                                                <input type="number" value={currentAge} onChange={(e) => setCurrentAge(Number(e.target.value))} className="w-full text-right py-3 px-3 outline-none text-gray-800 text-lg font-bold bg-transparent" />
                                                <div className="bg-gray-50 flex items-center px-3 sm:px-4 text-gray-600 font-medium border-l border-gray-300 whitespace-nowrap">세</div>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">은퇴 예상 나이</label>
                                            <div className="flex shadow-sm rounded-lg overflow-hidden border border-gray-300 focus-within:ring-2 focus-within:ring-[#FFCC00] focus-within:border-[#FFCC00] bg-white transition-all">
                                                <input type="number" value={retirementAge} onChange={(e) => setRetirementAge(Number(e.target.value))} className="w-full text-right py-3 px-3 outline-none text-gray-800 text-lg font-bold bg-transparent" />
                                                <div className="bg-gray-50 flex items-center px-3 sm:px-4 text-gray-600 font-medium border-l border-gray-300 whitespace-nowrap">세</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">필요 생활비 (현재 가치 기준)</label>
                                        <div className="flex shadow-sm rounded-lg overflow-hidden border border-gray-300 focus-within:ring-2 focus-within:ring-[#FFCC00] focus-within:border-[#FFCC00] bg-white transition-all">
                                            <input type="number" value={monthlyExpense} onChange={(e) => setMonthlyExpense(Number(e.target.value))} className="w-full text-right py-3 px-3 sm:px-4 outline-none text-[#3b3a39] text-xl font-extrabold bg-transparent" />
                                            <div className="bg-gray-50 flex items-center px-3 sm:px-5 text-gray-600 font-medium border-l border-gray-300 whitespace-nowrap">만 원 / 월</div>
                                        </div>
                                    </div>

                                    <div className="bg-gray-50 p-4 sm:p-5 rounded-xl border border-gray-200 mt-6 space-y-4">
                                        <h3 className="text-xs font-bold text-gray-500 uppercase tracking-widest flex items-center">
                                            <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                            가정 변수 (Assumptions)
                                        </h3>
                                        
                                        <div className="flex items-center justify-between">
                                            <label className="text-sm font-medium text-gray-700">물가 상승률</label>
                                            <div className="flex rounded-md overflow-hidden border border-gray-300 focus-within:ring-2 focus-within:ring-[#FFCC00] focus-within:border-[#FFCC00] w-24 sm:w-28 bg-white shadow-sm">
                                                <input type="number" step="0.1" value={inflationRate} onChange={(e) => setInflationRate(Number(e.target.value))} className="w-full text-right py-1.5 px-2 outline-none font-bold text-gray-800" />
                                                <div className="bg-gray-100 flex items-center px-2 text-gray-500 text-sm border-l border-gray-300">%</div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center justify-between">
                                            <label className="text-sm font-medium text-gray-700">은퇴 후 인출률</label>
                                            <div className="flex rounded-md overflow-hidden border border-gray-300 focus-within:ring-2 focus-within:ring-[#FFCC00] focus-within:border-[#FFCC00] w-24 sm:w-28 bg-white shadow-sm">
                                                <input type="number" step="0.1" value={withdrawalRate} onChange={(e) => setWithdrawalRate(Number(e.target.value))} className="w-full text-right py-1.5 px-2 outline-none font-bold text-gray-800" />
                                                <div className="bg-gray-100 flex items-center px-2 text-gray-500 text-sm border-l border-gray-300">%</div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center justify-between">
                                            <label className="text-sm font-medium text-gray-700">투자 수익률</label>
                                            <div className="flex rounded-md overflow-hidden border border-gray-300 focus-within:ring-2 focus-within:ring-[#FFCC00] focus-within:border-[#FFCC00] w-24 sm:w-28 bg-white shadow-sm">
                                                <input type="number" step="0.1" value={investmentReturnRate} onChange={(e) => setInvestmentReturnRate(Number(e.target.value))} className="w-full text-right py-1.5 px-2 outline-none font-bold text-gray-800" />
                                                <div className="bg-gray-100 flex items-center px-2 text-gray-500 text-sm border-l border-gray-300">%</div>
                                            </div>
                                        </div>
                                    </div>

                                    <label className={benzLabelClass}>
                                        <div className="relative flex-shrink-0">
                                            <input type="checkbox" className="sr-only" checked={useBenzMark} onChange={() => setUseBenzMark(!useBenzMark)} />
                                            <div className={benzToggleBg}></div>
                                            <div className={benzToggleDot}></div>
                                        </div>
                                        <div className="ml-4">
                                            <span className={benzTextClass}>벤츠 마크 적용 (자산 3분할)</span>
                                            <span className="block text-xs sm:text-sm text-gray-500 mt-1">부동산/현금 외, 목표액의 1/3만 투자로 준비</span>
                                        </div>
                                    </label>

                                </div>
                            </div>

                            <div className="lg:col-span-7 space-y-5">
                                
                                <div className="bg-white p-5 sm:p-7 rounded-2xl shadow-md border-l-4 border-l-gray-400">
                                    <h3 className="text-sm font-bold text-gray-500 mb-2">Step 1. 물가상승 반영</h3>
                                    <p className="text-gray-800 mb-4 sm:text-lg break-keep leading-relaxed">
                                        <span className="font-bold text-[#3b3a39]">{results.yearsToRetire}년 후</span> 은퇴 시점에 현재의 <span className="font-bold border-b-2 border-[#FFCC00]">{formatNumber(monthlyExpense)}만원</span>과 동일한 가치를 지니려면?
                                    </p>
                                    <div className="flex flex-col sm:flex-row gap-3 sm:gap-4 items-center">
                                        <div className="bg-gray-50 rounded-xl p-4 w-full text-center border border-gray-200">
                                            <div className="text-xs sm:text-sm text-gray-500 mb-1">필요 월 생활비</div>
                                            <div className="text-xl sm:text-2xl font-bold text-gray-800">{formatKRW(results.futureMonthlyExpense)}</div>
                                        </div>
                                        <div className="text-gray-300 font-bold hidden sm:block">× 12 =</div>
                                        <div className="bg-[#fcfbf9] rounded-xl p-4 w-full text-center border border-[#e8e4db] shadow-inner">
                                            <div className="text-xs sm:text-sm text-[#8c8273] mb-1">필요 연 생활비</div>
                                            <div className="text-xl sm:text-2xl font-bold text-[#5c5446]">{formatKRW(results.futureAnnualExpense)}</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-5 sm:p-7 rounded-2xl shadow-md border-l-4 border-l-[#FFCC00] relative overflow-hidden">
                                    <h3 className="text-sm font-bold text-gray-500 mb-2">Step 2. 목표 은퇴 자금 산출</h3>
                                    <p className="text-gray-800 mb-4 sm:text-lg break-keep leading-relaxed">
                                        원금을 깎아먹지 않고 매년 <span className="font-bold text-[#5c5446]">{formatKRW(results.futureAnnualExpense)}</span>의 이자 수익을 얻기 위해 모아야 할 총 자산입니다. <span className="text-sm text-gray-500">(수익률 {withdrawalRate}%)</span>
                                    </p>
                                    <div className="bg-[#fbfaf8] rounded-xl p-5 text-center border border-[#e8e4db]">
                                        <div className="text-sm text-gray-600 font-semibold mb-2">필요한 총 목표 은퇴 자금</div>
                                        <div className="text-3xl sm:text-4xl font-extrabold text-[#3b3a39] tracking-tight">
                                            {formatKRW(results.targetCorpus)}
                                        </div>
                                        {useBenzMark && (
                                            <div className="mt-4 text-sm text-[#3b3a39] bg-[#FFCC00]/20 inline-block px-4 py-2 rounded-full border border-[#FFCC00]/40 font-medium">
                                                💡 벤츠 마크 반영: 금융투자 목표액 <span className="font-bold text-black">{formatKRW(results.investmentTarget)}</span>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="bg-[#3b3a39] text-white p-6 sm:p-8 rounded-2xl shadow-xl relative mt-8 sm:mt-10 overflow-visible">
                                    <div className="absolute -top-4 sm:-top-5 left-6 bg-[#FFCC00] text-[#3b3a39] text-xs sm:text-sm font-extrabold px-4 py-1.5 sm:py-2 rounded-full shadow-lg border-2 border-white">
                                        KB Action Plan
                                    </div>
                                    <h3 className="text-sm font-bold text-gray-400 mb-2 mt-2">Step 3. 솔루션 제안</h3>
                                    <p className="text-gray-200 mb-6 text-sm sm:text-base leading-relaxed break-keep">
                                        {results.yearsToRetire}년 동안 연 {investmentReturnRate}%의 수익률로 <span className="text-white font-bold">{formatKRW(results.investmentTarget)}</span>을 모으기 위해 당장 시작해야 할 매월 저축액입니다.
                                    </p>
                                    
                                    <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between border-t border-gray-600 pt-6 gap-4">
                                        <div>
                                            <div className="text-gray-400 text-sm mb-1 font-medium">매월 투자해야 할 금액</div>
                                            <div className="text-4xl sm:text-5xl font-extrabold text-[#FFCC00] tracking-tight drop-shadow-sm">
                                                {formatKRW(results.monthlySavings)}
                                            </div>
                                        </div>
                                        <div className="bg-[#2a2928] px-5 py-4 rounded-xl text-center border border-gray-700 w-full sm:w-auto">
                                            <div className="text-xs text-gray-400 mb-1">총 투자 기간</div>
                                            <div className="text-xl font-bold text-white">{results.yearsToRetire * 12}개월</div>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-6 bg-gradient-to-r from-gray-800 to-[#2a2928] p-4 sm:p-5 rounded-xl text-sm sm:text-base text-gray-200 border-l-4 border-[#FFCC00] shadow-inner font-light leading-relaxed">
